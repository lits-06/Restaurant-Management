syntax = "proto3";

package notification;

option go_package = "restaurant-management/proto/notification";

import "google/protobuf/timestamp.proto";

// Notification Service Definition
service NotificationService {
  rpc SendNotification(SendNotificationRequest) returns (SendNotificationResponse);
  rpc SendBulkNotification(SendBulkNotificationRequest) returns (SendBulkNotificationResponse);
  rpc GetNotification(GetNotificationRequest) returns (GetNotificationResponse);
  rpc ListNotifications(ListNotificationsRequest) returns (ListNotificationsResponse);
  rpc MarkAsRead(MarkAsReadRequest) returns (MarkAsReadResponse);
  rpc DeleteNotification(DeleteNotificationRequest) returns (DeleteNotificationResponse);
}

// Enums
enum NotificationType {
  TYPE_UNKNOWN = 0;
  TYPE_EMAIL = 1;
  TYPE_SMS = 2;
  TYPE_PUSH = 3;
  TYPE_IN_APP = 4;
}

enum NotificationPriority {
  PRIORITY_LOW = 0;
  PRIORITY_NORMAL = 1;
  PRIORITY_HIGH = 2;
  PRIORITY_URGENT = 3;
}

enum NotificationStatus {
  STATUS_UNKNOWN = 0;
  STATUS_PENDING = 1;
  STATUS_SENT = 2;
  STATUS_DELIVERED = 3;
  STATUS_FAILED = 4;
  STATUS_READ = 5;
}

// Messages
message Notification {
  string notification_id = 1;
  string recipient_id = 2;
  string recipient_email = 3;
  string recipient_phone = 4;
  NotificationType type = 5;
  NotificationPriority priority = 6;
  string title = 7;
  string message = 8;
  string data = 9;
  NotificationStatus status = 10;
  google.protobuf.Timestamp sent_at = 11;
  google.protobuf.Timestamp read_at = 12;
  google.protobuf.Timestamp created_at = 13;
}

message SendNotificationRequest {
  string recipient_id = 1;
  string recipient_email = 2;
  string recipient_phone = 3;
  NotificationType type = 4;
  NotificationPriority priority = 5;
  string title = 6;
  string message = 7;
  string data = 8;
}

message SendNotificationResponse {
  Notification notification = 1;
  bool success = 2;
  string message = 3;
}

message SendBulkNotificationRequest {
  repeated string recipient_ids = 1;
  NotificationType type = 2;
  NotificationPriority priority = 3;
  string title = 4;
  string message = 5;
  string data = 6;
}

message SendBulkNotificationResponse {
  int32 sent_count = 1;
  int32 failed_count = 2;
  bool success = 3;
  string message = 4;
}

message GetNotificationRequest {
  string notification_id = 1;
}

message GetNotificationResponse {
  Notification notification = 1;
  bool success = 2;
  string message = 3;
}

message ListNotificationsRequest {
  string recipient_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  NotificationType type = 4;
  NotificationStatus status = 5;
  bool unread_only = 6;
}

message ListNotificationsResponse {
  repeated Notification notifications = 1;
  int32 total = 2;
  int32 unread_count = 3;
  int32 page = 4;
  int32 page_size = 5;
  bool success = 6;
  string message = 7;
}

message MarkAsReadRequest {
  string notification_id = 1;
}

message MarkAsReadResponse {
  bool success = 1;
  string message = 2;
}

message DeleteNotificationRequest {
  string notification_id = 1;
}

message DeleteNotificationResponse {
  bool success = 1;
  string message = 2;
}
