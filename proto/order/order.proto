syntax = "proto3";

package order;

option go_package = "restaurant-management/proto/order";

import "google/protobuf/timestamp.proto";

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc UpdateOrder(UpdateOrderRequest) returns (UpdateOrderResponse);
  rpc DeleteOrder(DeleteOrderRequest) returns (DeleteOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  rpc UpdateOrderStatus(UpdateOrderStatusRequest) returns (UpdateOrderStatusResponse);
  rpc AddOrderItem(AddOrderItemRequest) returns (AddOrderItemResponse);
  rpc RemoveOrderItem(RemoveOrderItemRequest) returns (RemoveOrderItemResponse);
}

message OrderItem {
  string item_id = 1;
  string name = 2;
  double price = 3;
  string category = 4;
  string image_url = 5;
  int32 quantity = 6;
}

message Order {
  string order_id = 1;
  string name = 2;
  string phone = 3;
  google.protobuf.Timestamp time = 4;
  int32 party_size = 5;
  string status = 6;
  int32 total_price = 7;
  repeated OrderItem items = 8;
}

message OrderItemRequest {
  string item_id = 1;
  string name = 2;
  double price = 3;
  int32 quantity = 4;
}

message CreateOrderRequest {
  string name = 1;
  string phone = 2;
  string time = 3;
  string date = 4;
  int32 party_size = 5;
  string status = 6;
  repeated OrderItemRequest items = 7;
}

message CreateOrderResponse {
  Order order = 1;
  bool success = 2;
  string message = 3;
}

message GetOrderRequest {
  string order_id = 1;
}

message GetOrderResponse {
  Order order = 1;
  bool success = 2;
  string message = 3;
}

message UpdateOrderRequest {
  string order_id = 1;
  string name = 2;
  string phone = 3;
  string time = 4;
  string date = 5;
  int32 party_size = 6;
  string status = 7;
  repeated OrderItemRequest items = 8;
}

message UpdateOrderResponse {
  Order order = 1;
  bool success = 2;
  string message = 3;
}

message DeleteOrderRequest {
  string order_id = 1;
}

message DeleteOrderResponse {
  bool success = 1;
  string message = 2;
}

message CancelOrderRequest {
  string order_id = 1;
  string reason = 2;
}

message CancelOrderResponse {
  bool success = 1;
  string message = 2;
}

message ListOrdersRequest {
  int32 page = 1;
  int32 page_size = 2;
  string status = 3;
  string keyword = 4;
}

message ListOrdersResponse {
  repeated Order orders = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
  bool success = 5;
  string message = 6;
}

message UpdateOrderStatusRequest {
  string order_id = 1;
  string status = 2;
}

message UpdateOrderStatusResponse {
  Order order = 1;
  bool success = 2;
  string message = 3;
}

message AddOrderItemRequest {
  string order_id = 1;
  OrderItemRequest item = 2;
}

message AddOrderItemResponse {
  Order order = 1;
  bool success = 2;
  string message = 3;
}

message RemoveOrderItemRequest {
  string order_id = 1;
  string item_id = 2;
}

message RemoveOrderItemResponse {
  Order order = 1;
  bool success = 2;
  string message = 3;
}