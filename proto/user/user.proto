syntax = "proto3";

package user;

option go_package = "restaurant-management/proto/user";

import "google/protobuf/timestamp.proto";

// User Service Definition
service UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc AssignRole(AssignRoleRequest) returns (AssignRoleResponse);
  rpc GetUserRoles(GetUserRolesRequest) returns (GetUserRolesResponse);
}

// Enums
enum UserRole {
  ROLE_UNKNOWN = 0;
  ROLE_ADMIN = 1;
  ROLE_MANAGER = 2;
  ROLE_WAITER = 3;
  ROLE_CHEF = 4;
  ROLE_CASHIER = 5;
}

enum UserStatus {
  STATUS_UNKNOWN = 0;
  STATUS_ACTIVE = 1;
  STATUS_INACTIVE = 2;
  STATUS_SUSPENDED = 3;
}

// Messages
message User {
  string user_id = 1;
  string email = 2;
  string username = 3;
  string full_name = 4;
  string phone = 5;
  repeated UserRole roles = 6;
  UserStatus status = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message CreateUserRequest {
  string email = 1;
  string username = 2;
  string full_name = 3;
  string phone = 4;
  string password = 5;
  repeated UserRole roles = 6;
}

message CreateUserResponse {
  User user = 1;
  bool success = 2;
  string message = 3;
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  User user = 1;
  bool success = 2;
  string message = 3;
}

message UpdateUserRequest {
  string user_id = 1;
  string email = 2;
  string username = 3;
  string full_name = 4;
  string phone = 5;
  UserStatus status = 6;
}

message UpdateUserResponse {
  User user = 1;
  bool success = 2;
  string message = 3;
}

message DeleteUserRequest {
  string user_id = 1;
}

message DeleteUserResponse {
  bool success = 1;
  string message = 2;
}

message ListUsersRequest {
  int32 page = 1;
  int32 page_size = 2;
  UserStatus status = 3;
  UserRole role = 4;
}

message ListUsersResponse {
  repeated User users = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
  bool success = 5;
  string message = 6;
}

message AssignRoleRequest {
  string user_id = 1;
  repeated UserRole roles = 2;
}

message AssignRoleResponse {
  bool success = 1;
  string message = 2;
}

message GetUserRolesRequest {
  string user_id = 1;
}

message GetUserRolesResponse {
  repeated UserRole roles = 1;
  bool success = 2;
  string message = 3;
}
